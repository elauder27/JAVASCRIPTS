<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rock Paper Sciccor game</title>
 </head>
<body>
            <p>Rock Paper Sciccors </p>
            <button class="js-rock-button">Rock</button>
                
                    <button 
                   class="js-paper-button">Paper</button>


                    <button 
                class="js-sciccors-button">Sciccors</button>

                                <p class="js-result"></p>
                                <p class="js-moves"></p>
                                <p class="js-score"></p>



                                <button
                                onclick="score.Wins = 0;
                                score.Loss = 0; score.Ties = 0;
                                localStorage.removeItem('score');
                                updateScoreElement();
                                "
                                >Reset Score</button> 
                                <button 
                                onclick="
                                autoPlay()
                               ">Auto play</button>
     
            <script> 

             const score = (JSON.parse(localStorage.getItem('score'))) || {
                Wins: 0,
                Loss: 0, 
                Ties: 0,
            }

          updateScoreElement();

/*if (!score){
    score = {
        Wins: 0,
        Loss: 0, 
        Ties: 0,
    }
}
 */  
        let isAutoPlaying = false;
        let intervalId;

        function autoPlay(){
           if(!isAutoPlaying) {
           intervalId = setInterval(function(){
                const playerMove = pickComputerMove();       
        playGame(playerMove)
            }, 1000);
            isAutoPlaying = true;

           } else {
            clearInterval(intervalId);
            isAutoPlaying = false;  
        }
        }


        document.querySelector('.js-rock-button')
        .addEventListener('click', () => {
            playGame('Rock')
        })

        document.querySelector('.js-paper-button').addEventListener('click' , () => {
            playGame('Paper')
        })
        document.querySelector('.js-sciccors-button').addEventListener('click', () => {
            playGame('Sciccors')
        })

        document.body.addEventListener('keydown' , (event) => {
            if (event.key ==='r'){
                playGame('Rock')
            }else if (event.key === 'p'){
                playGame('Paper')   
            }else if (event.key === 's'){
                playGame('Sciccors')
        }
        })
 
    function playGame(playerMove){
        const computerChoice = pickComputerMove()


        let result = ''
            if (playerMove === 'Rock') {
    if(computerChoice === 'Rock'){
                            result = 'Its a Tie'
                    }else if (computerChoice === 'Paper'){
                        result = 'You Lose'
                    }else if (computerChoice === 'Sciccors'){
                        result = 'You Win! Badass'
                    }

                    }else if (playerMove === 'Paper'){
                        if (computerChoice === 'Paper') {
                result = 'Its a Tie'
            }else if (computerChoice === 'Rock'){
                result = 'You Win! Badass'
            }else if (computerChoice === 'Sciccors') {
                result = 'You Lose'
            }
                            }else if(playerMove === 'Sciccors') {
        if (computerChoice === 'Sciccors'){ 
                    result ='Its a Tie';
                }else if (computerChoice === 'Paper'){
                    result = 'You Win! Badass';
                }else if(computerChoice === 'Rock'){
                    result = 'You Lose';
        }
    }
 
                    if(result === 'You Win! Badass'){
                        score.Wins += 1
                    }else if(result === 'You Lose'){
                        score.Loss += 1
                    }else if(result === 'Its a Tie'){
                        score.Ties += 1
                    }
                              localStorage.setItem('score', JSON.stringify(score));
                updateScoreElement();

            document.querySelector('.js-result').innerHTML = result;

            document.querySelector('.js-moves').innerHTML = `you picked ${playerMove} - Computer Picked ${computerChoice}`; 

                
    }       

    function updateScoreElement(){
          document.querySelector('.js-score').innerHTML = `Wins: ${score.Wins}, Loss: ${score.Loss}, Ties: ${score.Ties}`

    }

  function pickComputerMove() {
     const randomNumber = Math.random();
let computerChoice = ''
    let result = '';
  
        if(randomNumber >= 0 && randomNumber < 1 / 3){
    computerChoice =  'Rock'
        }else if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
            computerChoice = 'Paper'
        }else if (randomNumber >= 2 / 3 && randomNumber < 1) {
            computerChoice = 'Sciccors'
        }
    return computerChoice;

  }

    </script>
</body>
</html>
