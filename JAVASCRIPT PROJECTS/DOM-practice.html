<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM practice</title>
</head>

<body>

    <p>Youtube subscribe button</p>
    <button onclick="
   
subscribe()
    " class="js-subscribe-button">Subscribe</button>

    <p>Amazon shippinng calculator</p>
    <input class="js-item-price" placeholder="Cost of Order" onkeydown="handleCostClick(event)">
    <!-- clicks, keydowns are events 
     onclick, onkeydown are event listeners -->
    <button onclick="
    calculateTotal()
    ">Calculate</button>
    <p class="js-total"></p>


    <script>

        function handleCostClick(event) {
            if (event.key === 'Enter') {
                calculateTotal()
            }
        }
        function calculateTotal() {
            const itemElement = document.querySelector('.js-item-price');
            let cost = Number(itemElement.value)

            //whenever we get a value from the DOM it is a string
            if (cost < 40) {
                cost = cost + 10

            }

            document.querySelector('.js-total').innerHTML = `$${cost}`
        }

        function subscribe() {

            const buttonElement = document.querySelector('.js-subscribe-button');
            if (buttonElement.innerText === 'Subscribe') {
                buttonElement.innerHTML = 'Subscribed';
            } else {
                buttonElement.innerHTML = 'Subscribe'
            }

        }
    </script>

</body>

</html>
